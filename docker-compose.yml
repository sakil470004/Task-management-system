services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: task_management_db
    environment:
      POSTGRES_USER: taskadmin
      POSTGRES_PASSWORD: taskpass123
      POSTGRES_DB: task_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskadmin -d task_management_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend NestJS API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: task_management_backend
    environment:
      DATABASE_URL: postgresql://taskadmin:taskpass123@postgres:5432/task_management_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRY: 24h
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: task_management_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
